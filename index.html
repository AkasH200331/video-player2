<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video - Age Verification Required</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(0,0,0,0.8);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #ff4757; }
        .subtitle { font-size: 14px; color: #aaa; margin-bottom: 25px; }
        .progress-bar {
            background: #333;
            height: 8px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress {
            background: linear-gradient(90deg, #ff4757, #ff6348);
            height: 100%;
            width: 0%;
            transition: width 0.5s;
        }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .ad-box {
            background: #222;
            border: 2px dashed #444;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background: linear-gradient(90deg, #ff4757, #ff6348);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .timer { font-size: 16px; color: #ff4757; margin: 15px 0; }
        .banner-728 { margin: 20px auto; max-width: 100%; overflow: hidden; }
        .native-ad { margin: 15px 0; }
    </style>
</head>
<body>
    <!-- Social Bar Script - Auto loads -->
    <script src="https://assistedtogether.com/01/73/b4/0173b4028e9c73d716a537d51ff90abc.js"></script>
    
    <!-- Vignette Script - Auto triggers -->
    <script src="https://assistedtogether.com/b5/55/0a/b5550aed167b70315aa4b506e2cdb81f.js"></script>

    <div class="container">
        <h1>🔞 Premium Video Access</h1>
        <p class="subtitle">Complete 2-step verification to unlock</p>
        
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <!-- Step 1: Banner Ad -->
        <div class="step active" id="step1">
            <h3>Step 1 of 2: View Sponsor Ad</h3>
            <div class="banner-728">
                <script>
                    atOptions = {
                        'key' : 'cb6207cef6217cc53d5f25679e9e3070',
                        'format' : 'iframe',
                        'height' : 90,
                        'width' : 728,
                        'params' : {}
                    };
                </script>
                <script src="https://assistedtogether.com/cb6207cef6217cc53d5f25679e9e3070/invoke.js"></script>
            </div>
            <div class="timer">Please wait <span id="timer1">8</span> seconds...</div>
            <button class="btn" id="btn1" disabled>Continue to Step 2</button>
        </div>

        <!-- Step 2: Native Ad -->
        <div class="step" id="step2">
            <h3>Step 2 of 2: Confirm Age 18+</h3>
            <div class="native-ad">
                <div id="container-6e2df2c2005b57ae387350c8b8d38fad"></div>
            </div>
            <div class="timer">Please wait <span id="timer2">8</span> seconds...</div>
            <button class="btn" id="btn2" disabled>Unlock Video Now</button>
        </div>

        <!-- Step 3: Success -->
        <div class="step" id="step3">
            <h3 style="color: #2ed573;">✅ Access Granted!</h3>
            <p style="margin: 20px 0;">Redirecting to your video...</p>
            <div class="timer">Opening in <span id="timer3">3</span> seconds</div>
        </div>
    </div>

    <!-- Native Banner Script -->
    <script async="async" data-cfasync="false" src="https://assistedtogether.com/6e2df2c2005b57ae387350c8b8d38fad/invoke.js"></script>

    <script>
        let currentStep = 1;
        const progress = document.getElementById('progress');
        
        function updateProgress(percent) {
            progress.style.width = percent + '%';
        }

        // Step 1 Timer
        let time1 = 8;
        const timer1 = setInterval(() => {
            time1--;
            document.getElementById('timer1').textContent = time1;
            if (time1 <= 0) {
                clearInterval(timer1);
                document.getElementById('btn1').disabled = false;
                document.getElementById('btn1').textContent = 'Continue to Step 2 ✓';
            }
        }, 1000);

        // Step 1 Button
        document.getElementById('btn1').addEventListener('click', () => {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            updateProgress(50);
            currentStep = 2;
            startStep2();
        });

        // Step 2 Timer
        function startStep2() {
            let time2 = 8;
            const timer2 = setInterval(() => {
                time2--;
                document.getElementById('timer2').textContent = time2;
                if (time2 <= 0) {
                    clearInterval(timer2);
                    document.getElementById('btn2').disabled = false;
                    document.getElementById('btn2').textContent = 'Unlock Video Now ✓';
                }
            }, 1000);
        }

        // Step 2 Button
        document.getElementById('btn2').addEventListener('click', () => {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            updateProgress(100);
            currentStep = 3;
            
            // Redirect after 3 seconds
            let time3 = 3;
            const timer3 = setInterval(() => {
                time3--;
                document.getElementById('timer3').textContent = time3;
                if (time3 <= 0) {
                    clearInterval(timer3);
                    // මෙතන ඔයාගේ video link එක දාන්න
                    window.location.href = 'https://your-video-link.com';
                }
            }, 1000);
        });

        updateProgress(0);
    </script>
</body>
</html>
