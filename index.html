<script>
    const adLinks = [
        "https://omg10.com/4/11178170",
        "https://omg10.com/4/10315400"
    ];
    
    let adsClicked = [false, false];
    let isUnlocked = false;
    let popunderTriggered = false;

    window.addEventListener('DOMContentLoaded', () => {
        const stored = localStorage.getItem('videoLockBoxState');
        if (stored) {
            const state = JSON.parse(stored);
            adsClicked = state.adsClicked || [false, false];
            isUnlocked = state.isUnlocked || false;
            updateUI();
        }
        
        // Popunder - CPM $2-$8
        setTimeout(() => {
            if (!popunderTriggered) {
                window.open('https://omg10.com/4/11178170', '_blank');
                popunderTriggered = true;
            }
        }, 2000);
    });

    function saveState() {
        localStorage.setItem('videoLockBoxState', JSON.stringify({
            adsClicked: adsClicked,
            isUnlocked: isUnlocked
        }));
    }

    function clickAd(adNum) {
        if (isUnlocked) return;
        const adIndex = adNum - 1;
        if (adsClicked[adIndex]) return;
        window.open(adLinks[adIndex], '_blank');
        adsClicked[adIndex] = true;
        saveState();
        updateUI();
    }

    function updateUI() {
        const clickedCount = adsClicked.filter(Boolean).length;
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusText = document.getElementById('statusText');
        const watchBtn = document.getElementById('watchBtn');
        const adBtn1 = document.getElementById('adBtn1');
        const adBtn2 = document.getElementById('adBtn2');

        progressBar.style.width = (clickedCount / 2 * 100) + '%';
        progressText.textContent = clickedCount + '/2 Ads';

        if (adsClicked[0]) {
            adBtn1.innerHTML = '<svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>Completed ✓</span>';
            adBtn1.disabled = true;
            adBtn1.classList.remove('ad-btn');
            adBtn1.classList.add('bg-green-600', 'cursor-not-allowed');
        }
        if (adsClicked[1]) {
            adBtn2.innerHTML = '<svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>Completed ✓</span>';
            adBtn2.disabled = true;
            adBtn2.classList.remove('ad-btn');
            adBtn2.classList.add('bg-green-600', 'cursor-not-allowed');
        }

        if (clickedCount === 2) {
            isUnlocked = true;
            saveState();
            statusBox.classList.remove('bg-slate-800/50', 'border-slate-700/50');
            statusBox.classList.add('bg-green-500/10', 'border-green-500/20');
            statusIcon.classList.remove('bg-amber-500/20');
            statusIcon.classList.add('bg-green-500/20');
            statusIcon.innerHTML = '<svg class="w-4 h-4 sm:w-5 sm:h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            statusTitle.textContent = 'Video Unlocked!';
            statusTitle.classList.remove('text-white');
            statusTitle.classList.add('text-green-400');
            statusText.textContent = 'Video unlocked! Click to watch';
            statusText.classList.remove('text-slate-400');
            statusText.classList.add('text-green-300');
            watchBtn.disabled = false;
            watchBtn.innerHTML = '<svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>Watch Video - Unlocked!</span>';
        }
    }

    function watchVideo() {
        if (!isUnlocked) return;
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('hidden');
        video.play().catch(err => { console.log('Video autoplay prevented:', err); });
    }

    function closeVideoModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        video.pause();
        video.currentTime = 0;
        modal.classList.add('hidden');
    }

    function closeModalOnBackdrop(event) {
        if (event.target.id === 'videoModal') { closeVideoModal(); }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modal = document.getElementById('videoModal');
            if (!modal.classList.contains('hidden')) {
                e.preventDefault();
                closeVideoModal();
            }
        }
    });
</script>
